{% extends "base.html" %}

{% block title %}Login | Loyola CS Digital Assistant{% endblock %}

{% block body %}
<main class="flex min-h-screen items-center justify-center px-6 py-12">
    <section class="w-full max-w-md rounded-3xl border border-white/10 bg-white/10 p-8 shadow-glass backdrop-blur-2xl">
        <div class="mb-8">
            <p class="text-sm uppercase tracking-[0.3em] text-cyan-300">Secure Access</p>
            <h1 class="mt-3 text-3xl font-semibold text-white">Welcome back</h1>
            <p class="mt-3 text-sm text-slate-300">Sign in to access the Loyola CS Digital Assistant dashboard.</p>
        </div>

        <form method="post" class="space-y-5">
            <div>
                <label for="username" class="mb-2 block text-sm text-slate-200">Username</label>
                <input id="username" name="username" type="text" required class="w-full rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3 text-white outline-none transition focus:border-cyan-400">
            </div>
            <div>
                <label for="password" class="mb-2 block text-sm text-slate-200">Password</label>
                <input id="password" name="password" type="password" required class="w-full rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3 text-white outline-none transition focus:border-cyan-400">
            </div>
            <button type="submit" class="w-full rounded-2xl bg-gradient-to-r from-cyan-500 via-sky-500 to-fuchsia-500 px-4 py-3 font-medium text-white transition hover:scale-[1.01]">Login</button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-300">
            Need an account?
            <a href="{{ url_for('auth.register') }}" class="text-cyan-300 hover:text-cyan-200">Register</a>
        </p>
    </section>
</main>
{% endblock %}
