<aside class="w-full rounded-3xl border border-white/10 bg-white/10 p-5 shadow-glass backdrop-blur-2xl lg:w-72">
    <div class="mb-8">
        <p class="text-xs uppercase tracking-[0.3em] text-cyan-300">Workspace</p>
        <h2 class="mt-3 text-xl font-semibold text-white">Loyola Assistant</h2>
        <p class="mt-2 text-sm text-slate-300">College information dashboard and chatbot console.</p>
    </div>

    <nav class="space-y-2">
        <a href="{{ url_for('main.dashboard') }}" class="block rounded-2xl px-4 py-3 text-sm text-slate-200 transition hover:bg-white/10">Dashboard</a>
        <a href="{{ url_for('chat.chat') }}" class="block rounded-2xl px-4 py-3 text-sm text-slate-200 transition hover:bg-white/10">Chat</a>
        {% if current_user.is_authenticated and current_user.is_admin() %}
            <a href="{{ url_for('admin.admin') }}" class="block rounded-2xl px-4 py-3 text-sm text-slate-200 transition hover:bg-white/10">Admin</a>
        {% endif %}
        <a href="{{ url_for('auth.logout') }}" class="block rounded-2xl px-4 py-3 text-sm text-rose-200 transition hover:bg-rose-500/10">Logout</a>
    </nav>
</aside>
