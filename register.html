{% extends "base.html" %}

{% block title %}Register | Loyola CS Digital Assistant{% endblock %}

{% block body %}
<main class="flex min-h-screen items-center justify-center px-6 py-12">
    <section class="w-full max-w-md rounded-3xl border border-white/10 bg-white/10 p-8 shadow-glass backdrop-blur-2xl">
        <div class="mb-8">
            <p class="text-sm uppercase tracking-[0.3em] text-cyan-300">Create Account</p>
            <h1 class="mt-3 text-3xl font-semibold text-white">Start using the assistant</h1>
            <p class="mt-3 text-sm text-slate-300">Create a secure account to access the dashboard and chatbot.</p>
        </div>

        <form method="post" class="space-y-5">
            <div>
                <label for="username" class="mb-2 block text-sm text-slate-200">Username</label>
                <input id="username" name="username" type="text" required class="w-full rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3 text-white outline-none transition focus:border-cyan-400">
            </div>
            <div>
                <label for="password" class="mb-2 block text-sm text-slate-200">Password</label>
                <input id="password" name="password" type="password" required class="w-full rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3 text-white outline-none transition focus:border-cyan-400">
            </div>
            <div>
                <label for="confirm_password" class="mb-2 block text-sm text-slate-200">Confirm Password</label>
                <input id="confirm_password" name="confirm_password" type="password" required class="w-full rounded-2xl border border-white/10 bg-slate-900/70 px-4 py-3 text-white outline-none transition focus:border-cyan-400">
            </div>
            <button type="submit" class="w-full rounded-2xl bg-gradient-to-r from-cyan-500 via-sky-500 to-fuchsia-500 px-4 py-3 font-medium text-white transition hover:scale-[1.01]">Register</button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-300">
            Already registered?
            <a href="{{ url_for('auth.login') }}" class="text-cyan-300 hover:text-cyan-200">Login</a>
        </p>
    </section>
</main>
{% endblock %}
