{% extends "base.html" %}

{% block title %}Access Denied | Loyola CS Digital Assistant{% endblock %}

{% block body %}
<main class="flex min-h-screen items-center justify-center px-6 py-12">
    <section class="w-full max-w-xl rounded-3xl border border-white/10 bg-white/10 p-8 text-center shadow-glass backdrop-blur-2xl">
        <p class="text-sm uppercase tracking-[0.3em] text-cyan-300">403</p>
        <h1 class="mt-3 text-3xl font-semibold text-white">Access denied</h1>
        <p class="mt-4 text-slate-300">This page is available only to administrator accounts.</p>
        <a href="{{ url_for('main.dashboard') }}" class="mt-6 inline-flex rounded-2xl bg-gradient-to-r from-cyan-500 via-sky-500 to-fuchsia-500 px-5 py-3 text-sm font-medium text-white">Return to dashboard</a>
    </section>
</main>
{% endblock %}
